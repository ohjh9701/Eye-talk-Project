spring.application.name=EyeTalkProject

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 데이터베이스 연결에 필요한 JDBC 연결 정보
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=eyetalk
spring.datasource.password=eyetalk

# Hikari Datasource 연동과 validation query(오라클용, MySQL은 SELECT 1)
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=8
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# MyBatis 설정
mybatis.config-location=classpath:mybatis-config.xml
mybatis.mapper-locations=classpath:mappers*.xml

## 자료업로드 사이즈
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

## 외장하드 (데이타베이스: 절대중복되지파일명을 만들어서 넣는다)
upload.path=C:/upload